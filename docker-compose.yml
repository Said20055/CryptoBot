version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cryptobot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cryptobot
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bot -d cryptobot"]
      interval: 5s
      timeout: 5s
      retries: 10

  cryptobot:
    build: .
    container_name: cryptobot-dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/usr/src/app
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://bot:${POSTGRES_PASSWORD}@postgres:5432/cryptobot

volumes:
  pgdata:
